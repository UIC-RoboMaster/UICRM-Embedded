proc start_rtt { } {
    init
    
    rtt setup 0x20000000 0x30000 "SEGGER RTT"
    rtt start
    rtt server start 8888 0
    rtt polling_interval 10
}

proc stop_rtt { } {
    rtt stop
}

$_TARGETNAME configure -event examine-start stop_rtt
$_TARGETNAME configure -event examine-end start_rtt


start_rtt